apply plugin: 'com.android.application'

def readZeticPat() {
    def fromEnv = System.getenv("ZETIC_PAT")
    if (fromEnv != null && !fromEnv.trim().isEmpty()) return fromEnv.trim()

    def fromProp = project.findProperty("ZETIC_PAT")
    if (fromProp != null && !fromProp.toString().trim().isEmpty()) return fromProp.toString().trim()

    def envFile = rootProject.file("../.env.local")
    if (envFile.exists()) {
        for (String line : envFile.readLines("UTF-8")) {
            def trimmed = line.trim()
            if (trimmed.isEmpty() || trimmed.startsWith("#")) continue
            def eq = trimmed.indexOf("=")
            if (eq <= 0) continue
            def key = trimmed.substring(0, eq).trim()
            def value = trimmed.substring(eq + 1).trim()
            if (value.startsWith("\"") && value.endsWith("\"") && value.length() >= 2) {
                value = value.substring(1, value.length() - 1)
            }
            if (key == "ZETIC_PAT" && !value.isEmpty()) return value
        }
    }
    return ""
}

def readSigningValue(String key) {
    def fromEnv = System.getenv(key)
    if (fromEnv != null && !fromEnv.trim().isEmpty()) return fromEnv.trim()

    def fromProp = project.findProperty(key)
    if (fromProp != null && !fromProp.toString().trim().isEmpty()) return fromProp.toString().trim()

    def envFile = rootProject.file("../.env.local")
    if (envFile.exists()) {
        for (String line : envFile.readLines("UTF-8")) {
            def trimmed = line.trim()
            if (trimmed.isEmpty() || trimmed.startsWith("#")) continue
            def eq = trimmed.indexOf("=")
            if (eq <= 0) continue
            def envKey = trimmed.substring(0, eq).trim()
            def value = trimmed.substring(eq + 1).trim()
            if (value.startsWith("\"") && value.endsWith("\"") && value.length() >= 2) {
                value = value.substring(1, value.length() - 1)
            }
            if (envKey == key && !value.isEmpty()) return value
        }
    }
    return ""
}
android {
    namespace "com.aimapsystem.app"
    compileSdk rootProject.ext.compileSdkVersion
    buildFeatures {
        buildConfig = true
    }
    packagingOptions {
        jniLibs {
            useLegacyPackaging true
        }
    }
    defaultConfig {
        applicationId "com.aimapsystem.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        buildConfigField "String", "ZETIC_PAT", "\"${readZeticPat()}\""
        buildConfigField "String", "ZETIC_LLM_MODEL", "\"google/gemma-3-4b-it\""
        buildConfigField "String", "ZETIC_LLM_FALLBACK_MODEL", "\"LiquidAI/LFM2.5-1.2B-Instruct\""
        buildConfigField "String", "ZETIC_SPEECH_MODEL", "\"ZETIC-ai/whisper-base-decoder\""
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
        signingConfigs {
        release {
            def storeFilePath = readSigningValue("MELANGE_RELEASE_STORE_FILE")
            def storePasswordValue = readSigningValue("MELANGE_RELEASE_STORE_PASSWORD")
            def keyAliasValue = readSigningValue("MELANGE_RELEASE_KEY_ALIAS")
            def keyPasswordValue = readSigningValue("MELANGE_RELEASE_KEY_PASSWORD")

            if (!storeFilePath.isEmpty() && !storePasswordValue.isEmpty() && !keyAliasValue.isEmpty() && !keyPasswordValue.isEmpty()) {
                storeFile file(storeFilePath)
                storePassword storePasswordValue
                keyAlias keyAliasValue
                keyPassword keyPasswordValue
                enableV1Signing true
                enableV2Signing true
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (signingConfigs.release.storeFile != null) {
                signingConfig signingConfigs.release
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    implementation "com.zeticai.mlange:mlange:1.6.1"
    implementation "com.graphhopper:graphhopper-core:9.0"
    implementation "com.graphhopper:graphhopper-web-api:9.0"
    implementation "org.slf4j:slf4j-simple:2.0.13"
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}

